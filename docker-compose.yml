services:
  postgres:
    image: postgres:16-alpine
    container_name: myphone-postgres
    environment:
      POSTGRES_DB: myphone
      POSTGRES_USER: myphone
      POSTGRES_PASSWORD: myphone_local
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myphone -d myphone"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: myphone-redis
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: myphone-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://myphone:myphone_local@postgres:5432/myphone?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "pnpm --filter api dev"

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: myphone-web
    environment:
      VITE_API_BASE_URL: http://localhost:3000/api
    ports:
      - "15173:5173"
    depends_on:
      - api
    command: sh -c "pnpm --filter web dev --host 0.0.0.0"

volumes:
  postgres_data:
  redis_data:
